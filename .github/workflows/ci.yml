name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Stage 1: Install core torch dependencies first
          pip install torch==2.2.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          
          # Stage 2: Install PyG dependencies using pre-built wheels
          pip install torch-scatter torch-sparse torch-cluster torch-spline-conv torch-geometric -f https://data.pyg.org/whl/torch-2.2.0+cpu.html
          
          # Stage 3: Install remaining requirements (skipping torch/pyg already installed)
          # We use a trick to ignore lines that we already installed to save time/space
          grep -vE "torch|torchvision|torchaudio|torch-geometric|torch-scatter|torch-sparse|torch-cluster|torch-spline-conv" backend/requirements.txt > ci-requirements.txt
          pip install -r ci-requirements.txt
          
          pip install pytest httpx pytest-asyncio
          
      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/tests
